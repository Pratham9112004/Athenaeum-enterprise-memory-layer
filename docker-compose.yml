services:
  postgres:
    image: postgres:16-alpine
    container_name: athenaeum-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-athenaeum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-athenaeum}
      POSTGRES_DB: ${POSTGRES_DB:-athenaeum}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athenaeum} -d ${POSTGRES_DB:-athenaeum}"]
      interval: 5s
      timeout: 5s
      retries: 10

  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: athenaeum-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: athenaeum-backend
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-athenaeum}:${POSTGRES_PASSWORD:-athenaeum}@postgres:5432/${POSTGRES_DB:-athenaeum}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      STORAGE_DIR: /app/storage
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/storage
    # Apply migrations, then serve. --reload for the dev bind-mount workflow.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: athenaeum-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
